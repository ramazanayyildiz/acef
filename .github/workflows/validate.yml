name: validate

on:
  push:
  pull_request:

jobs:
  test-matrix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run full test suite (all scripts/test-acef-*)
        run: |
          for f in scripts/test-acef-*; do
            echo "== $f =="
            node "$f"
          done
      - name: closeout verify — integration check (cli delivery fixture)
        run: node tests/fixtures/closeout-delivery/run.js
