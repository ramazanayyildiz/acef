name: validate

on:
  push:
  pull_request:

jobs:
  process-validator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/test-acef-process-validator
      - run: node scripts/test-acef-closeout-verify
